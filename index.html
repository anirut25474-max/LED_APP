<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สื่อการสอนวงจรอิเล็กทรอนิกส์ (PRO) - วงจรประยุกต์ (มีโหลด)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151f32',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        cyan: {
                            500: '#06b6d4',
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #0f172a; /* Slate-900 */
            color: #f8fafc; /* Slate-50 */
        }

        /* SVG Animation Styles */
        @keyframes flow {
            from { stroke-dashoffset: 24; }
            to { stroke-dashoffset: 0; }
        }

        @keyframes flow-reverse {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: 24; }
        }

        .wire {
            stroke: #475569; /* Slate-600 */
            stroke-width: 3;
            fill: none;
            transition: all 0.3s ease;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .wire.flowing {
            stroke: #eab308; /* Yellow-500 */
            stroke-width: 4;
            stroke-dasharray: 12, 12;
            animation: flow 0.6s linear infinite;
        }

        .wire.flowing-reverse {
            stroke: #eab308; /* Yellow-500 */
            stroke-width: 4;
            stroke-dasharray: 12, 12;
            animation: flow-reverse 0.6s linear infinite;
        }

        /* Circuit 4 Red Wire overrides */
        .wire.flowing-red {
            stroke: #ef4444; /* Red-500 */
            stroke-width: 4;
            stroke-dasharray: 12, 12;
            animation: flow 0.6s linear infinite;
        }
        
        .wire.flowing-red-reverse {
            stroke: #ef4444; /* Red-500 */
            stroke-width: 4;
            stroke-dasharray: 12, 12;
            animation: flow-reverse 0.6s linear infinite;
        }

        .component-path {
            stroke: #f8fafc; /* White/Slate-50 */
            stroke-width: 2.5;
            fill: none;
            stroke-linejoin: round;
        }
        
        .component-fill {
            fill: #f8fafc;
        }

        .component-bg {
            fill: #1e293b; /* Slate-800 */
        }

        /* Grid Background for Canvas - Dark Mode */
        .canvas-grid {
            background-color: #0f172a;
            background-image: 
                linear-gradient(to right, #1e293b 1px, transparent 1px),
                linear-gradient(to bottom, #1e293b 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label-mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVG Components (Dark Mode Optimized) --- //
        
        const Battery = ({ x, y, polarity = 1 }) => (
            <g transform={`translate(${x}, ${y})`}>
                <text x="-35" y={polarity === 1 ? "-15" : "25"} className="text-xl font-bold fill-red-500 label-mono">+</text>
                <text x="-35" y={polarity === 1 ? "25" : "-15"} className="text-xl font-bold fill-slate-300 label-mono">-</text>
                
                {/* Wiring connection points */}
                <line x1="0" y1="-50" x2="0" y2="-20" className="component-path" />
                <line x1="0" y1="20" x2="0" y2="50" className="component-path" />

                {/* Battery Symbol */}
                {polarity === 1 ? (
                    <>
                        <line x1="-25" y1="-20" x2="25" y2="-20" stroke="#f8fafc" strokeWidth="2.5" />
                        <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#f8fafc" strokeWidth="5" />
                        <line x1="-25" y1="10" x2="25" y2="10" stroke="#f8fafc" strokeWidth="2.5" />
                        <line x1="-15" y1="20" x2="15" y2="20" stroke="#f8fafc" strokeWidth="5" />
                    </>
                ) : (
                    <>
                        <line x1="-15" y1="-20" x2="15" y2="-20" stroke="#f8fafc" strokeWidth="5" />
                        <line x1="-25" y1="-10" x2="25" y2="-10" stroke="#f8fafc" strokeWidth="2.5" />
                        <line x1="-15" y1="10" x2="15" y2="10" stroke="#f8fafc" strokeWidth="5" />
                        <line x1="-25" y1="20" x2="25" y2="20" stroke="#f8fafc" strokeWidth="2.5" />
                    </>
                )}
            </g>
        );

        const Resistor = ({ x, y, rotation = 0, label = "R_s", labelOffsetX=40, labelOffsetY=5 }) => (
            <g transform={`translate(${x}, ${y}) rotate(${rotation})`}>
                <rect x="-15" y="-35" width="30" height="70" className="component-path component-bg" />
                <text 
                    x={labelOffsetX} 
                    y={labelOffsetY} 
                    className="text-lg fill-slate-200 label-mono" 
                    transform={`rotate(${-rotation})`}
                >
                    {label}
                </text>
            </g>
        );

        const Diode = ({ x, y, rotation = 0, label="Diode", labelOffsetX=0, labelOffsetY=45 }) => (
            <g transform={`translate(${x}, ${y}) rotate(${rotation})`}>
                <polygon points="-20,-15 20,-15 0,15" className="component-path component-bg" />
                <line x1="-20" y1="15" x2="20" y2="15" className="component-path" strokeWidth="3" />
                <text 
                    x={labelOffsetX} 
                    y={labelOffsetY} 
                    textAnchor="middle" 
                    className="text-base fill-slate-300 label-mono" 
                    transform={`rotate(${-rotation})`}
                >
                    {label}
                </text>
            </g>
        );

        const LED = ({ x, y, rotation = 0, isOn = false, label="LED", labelOffsetX=0, labelOffsetY=55, color="#10b981" }) => (
            <g transform={`translate(${x}, ${y}) rotate(${rotation})`}>
                
                {/* Glow Background Circle */}
                <circle 
                    cx="0" cy="0" r="28" 
                    fill={isOn ? color : 'transparent'} 
                    className="transition-all duration-300"
                    style={{ 
                        opacity: isOn ? 0.35 : 0,
                        filter: isOn ? `blur(8px)` : 'none'
                    }} 
                />
                
                {/* Outer Glass Ring */}
                <circle 
                    cx="0" cy="0" r="22" 
                    fill="transparent" 
                    stroke={isOn ? color : "#475569"} 
                    strokeWidth="2" 
                    strokeDasharray={isOn ? "none" : "4 2"}
                    className="transition-all duration-300 opacity-60"
                />

                {/* Main Diode Body */}
                <g style={{ filter: isOn ? `drop-shadow(0 0 4px ${color})` : 'none', transition: 'all 0.3s' }}>
                    <polygon points="-16,-12 16,-12 0,16" className="component-path transition-all duration-300" stroke={isOn ? '#ffffff' : '#f8fafc'} fill={isOn ? color : "#1e293b"} />
                    <line x1="-16" y1="16" x2="16" y2="16" className="component-path transition-all duration-300" stroke={isOn ? '#ffffff' : '#f8fafc'} strokeWidth="3" />
                </g>

                {/* Animated Light Rays */}
                <g transform="translate(18, -10)" className={isOn ? 'opacity-100' : 'opacity-0'} style={{ transition: 'all 0.3s ease', filter: isOn ? `drop-shadow(0 0 6px ${color})` : 'none' }}>
                    <line x1="0" y1="0" x2="12" y2="-12" stroke={color} strokeWidth="3" strokeLinecap="round" />
                    <polygon points="12,-12 6,-12 12,-6" fill={color} />
                    
                    <line x1="-8" y1="-8" x2="4" y2="-20" stroke={color} strokeWidth="3" strokeLinecap="round" />
                    <polygon points="4,-20 -2,-20 4,-14" fill={color} />
                </g>

                <text 
                    x={labelOffsetX} 
                    y={labelOffsetY} 
                    textAnchor="middle" 
                    className="text-base font-bold label-mono transition-colors duration-300" 
                    transform={`rotate(${-rotation})`}
                    style={{
                        textShadow: isOn ? `0 0 10px ${color}` : 'none',
                        fill: isOn ? color : '#94a3b8' /* slate-400 */
                    }}
                >
                    {label}
                </text>
            </g>
        );

        const Dot = ({ x, y }) => <circle cx={x} cy={y} r="5" className="component-fill" />;

        const BlockedIndicator = ({ x, y, labelOffsetX=35, labelOffsetY=5, labelAlign="start" }) => (
            <g transform={`translate(${x}, ${y})`} className="animate-pulse">
                <text x={labelOffsetX} y={labelOffsetY} textAnchor={labelAlign} className="text-xs font-bold fill-red-500 label-mono">Blocked</text>
                <line x1="-15" y1="-10" x2="15" y2="10" stroke="#ef4444" strokeWidth="3" />
                <line x1="-15" y1="10" x2="15" y2="-10" stroke="#ef4444" strokeWidth="3" />
            </g>
        );

        // --- Educational Data & Logic --- //

        const CircuitDescriptions = [
            {
                id: 1,
                title: "วงจรประยุกต์: วงจรตรวจสอบขั้วไฟฟ้า",
                explanation: "วงจรนี้มี 3 สาขาขนานกัน โดยใช้ LED 2 ตัวสลับขั้วกัน และมีอุปกรณ์ไฟฟ้า (โหลด) ต่อร่วมด้วย เพื่อใช้เป็นวงจรเช็คว่าเราต่อขั้วแบตเตอรี่ได้ถูกต้องตามที่อุปกรณ์ต้องการหรือไม่",
                observeNormal: [
                    { type: 'good', text: "ไฟขั้วบวก (+) เข้าด้านบน: กระแสไหลลงล่างเข้าหา LED เขียว ทำให้ LED เขียวสว่าง" },
                    { type: 'info', text: "LED แดง ถูกบล็อกกระแสไว้ อุปกรณ์ไฟฟ้าทำงานปกติ (+ เข้าด้านบน)" }
                ],
                observeReverse: [
                    { type: 'alert', text: "ไฟขั้วลบ (-) เข้าด้านบน: กระแสวิ่งย้อนกลับขึ้นบน ทำให้ทะลุผ่าน LED แดง (สว่าง)" },
                    { type: 'info', text: "LED เขียว ถูกบล็อกกระแส อุปกรณ์ไฟฟ้าได้รับไฟกลับขั้ว (- เข้าด้านบน)" }
                ]
            }
        ];

        const App = () => {
            const [activeCircuit, setActiveCircuit] = useState(1);
            const [powerOn, setPowerOn] = useState(false);
            const [polarity, setPolarity] = useState(1);
            const [showDesc, setShowDesc] = useState(true);

            useEffect(() => {
                setPowerOn(false);
                setPolarity(1);
            }, [activeCircuit]);

            const getWireClass = (flowState, isRed = false) => {
                if (!powerOn) return "wire";
                if (flowState === 'forward') return isRed ? "wire flowing-red" : "wire flowing";
                if (flowState === 'reverse') return isRed ? "wire flowing-red-reverse" : "wire flowing-reverse";
                return "wire";
            };

            const renderCircuit1 = () => {
                const isNormal = polarity === 1;
                let main_top=false, led_G_t=false, led_R_t=false, load_t=false;
                let led_G_b=false, led_R_b=false, load_b=false, main_bot=false;
                let ledG_On = false;
                let ledR_On = false;

                if (powerOn) {
                    if (isNormal) {
                        main_top='forward'; led_G_t='forward'; led_G_b='forward'; 
                        load_t='forward'; load_b='forward'; main_bot='forward';
                        ledG_On = true;
                    } else {
                        main_top='reverse'; led_R_t='reverse'; led_R_b='reverse';
                        load_t='reverse'; load_b='reverse'; main_bot='reverse';
                        ledR_On = true;
                    }
                }

                return (
                    <svg viewBox="0 0 700 500" className="w-full h-full max-h-[500px] drop-shadow-lg">
                        <Battery x={100} y={250} polarity={polarity} />
                        
                        <path d="M 100 200 L 100 100 L 165 100" className={getWireClass(main_top)} />
                        <Resistor x={200} y={100} rotation={90} label="R_s" labelOffsetX={0} labelOffsetY={-25} />
                        
                        {/* Red Arrow indicating specific branch flow on Green LED */}
                        <path d="M 235 100 L 330 100" className={getWireClass(main_top, true)} />
                        <g transform={`translate(260, 100) ${!isNormal && powerOn ? 'rotate(180) translate(-50, 0)' : ''}`}>
                            <line x1="0" y1="0" x2="30" y2="0" stroke="#ef4444" strokeWidth="4" />
                            <polygon points="30,0 20,-8 20,8" fill="#ef4444" />
                        </g>

                        <path d="M 330 100 L 450 100" className={getWireClass(main_top)} />
                        <path d="M 450 100 L 580 100" className={getWireClass(main_top)} />
                        
                        {/* Green LED Branch */}
                        <path d="M 330 100 L 330 205" className={getWireClass(led_G_t)} />
                        <LED x={330} y={220} rotation={0} isOn={ledG_On} label="เขียว" labelOffsetX={-45} labelOffsetY={5} color="#10b981" />
                        <path d="M 330 235 L 330 400" className={getWireClass(led_G_b)} />

                        {powerOn && !isNormal && <BlockedIndicator x={330} y={190} labelOffsetX={-40} labelOffsetY={5} labelAlign="end" />}

                        {/* Red LED Branch */}
                        <path d="M 450 100 L 450 205" className={getWireClass(led_R_t)} />
                        <LED x={450} y={220} rotation={180} isOn={ledR_On} label="แดง" labelOffsetX={-40} labelOffsetY={5} color="#ef4444" />
                        <path d="M 450 235 L 450 400" className={getWireClass(led_R_b)} />

                        {powerOn && isNormal && <BlockedIndicator x={450} y={190} labelOffsetX={40} labelOffsetY={5} labelAlign="start" />}

                        {/* Load Branch */}
                        <path d="M 580 100 L 580 160" className={getWireClass(load_t)} />
                        <g transform="translate(580, 250)">
                            <rect x="-40" y="-90" width="80" height="180" className="component-path component-bg" />
                            <text x="0" y="-10" textAnchor="middle" className="text-xl font-bold fill-slate-200">อุปกรณ์</text>
                            <text x="0" y="20" textAnchor="middle" className="text-xl font-bold fill-slate-200">ไฟฟ้า</text>
                            
                            <text x="-55" y="-70" className={`text-xl font-bold label-mono ${isNormal ? 'fill-red-500' : 'fill-slate-300'}`}>{isNormal ? '+' : '-'}</text>
                            <text x="-55" y="80" className={`text-xl font-bold label-mono ${isNormal ? 'fill-slate-300' : 'fill-red-500'}`}>{isNormal ? '-' : '+'}</text>
                        </g>
                        <path d="M 580 340 L 580 400" className={getWireClass(load_b)} />

                        <path d="M 580 400 L 450 400" className={getWireClass(main_bot)} />
                        <path d="M 450 400 L 330 400" className={getWireClass(main_bot)} />
                        <path d="M 330 400 L 100 400 L 100 300" className={getWireClass(main_bot)} />

                        <Dot x={330} y={100} />
                        <Dot x={450} y={100} />
                        <Dot x={580} y={100} />
                        <Dot x={330} y={400} />
                        <Dot x={450} y={400} />
                        <Dot x={580} y={400} />
                    </svg>
                );
            };

            const activeDesc = CircuitDescriptions.find(c => c.id === activeCircuit);
            const observes = polarity === 1 ? activeDesc.observeNormal : activeDesc.observeReverse;

            return (
                <div className="h-screen flex flex-col md:flex-row bg-[#0f172a]">
                    
                    {/* Sidebar */}
                    <aside className="w-full md:w-72 glass-panel border-r border-slate-700/50 flex flex-col z-20 flex-shrink-0 shadow-2xl">
                        <div className="p-6 border-b border-slate-700/50 bg-indigo-900/50">
                            <h1 className="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent flex items-center gap-2">
                                <span>⭐</span> Diode PRO
                            </h1>
                            <p className="text-indigo-200 text-sm mt-1">บทเรียนวงจรประยุกต์</p>
                        </div>
                        <nav className="flex-1 p-4 flex flex-col space-y-3 overflow-y-auto">
                            <h2 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1 px-2">เนื้อหา</h2>
                            {[1].map((num) => (
                                <button
                                    key={num}
                                    onClick={() => setActiveCircuit(num)}
                                    className={`w-full text-left px-5 py-4 rounded-xl font-medium transition-all duration-300 border ${
                                        activeCircuit === num 
                                        ? 'bg-indigo-500/20 text-indigo-400 border-indigo-500/50 shadow-[0_0_15px_rgba(99,102,241,0.15)]' 
                                        : 'bg-slate-800/30 text-slate-400 border-transparent hover:bg-slate-800 hover:text-slate-200'
                                    }`}
                                >
                                    <div className="flex items-center gap-3">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 ${activeCircuit === num ? 'bg-indigo-500 text-white' : 'bg-slate-700 text-slate-300'}`}>
                                            🔌
                                        </div>
                                        <span className="leading-tight">{CircuitDescriptions.find(c => c.id === num).title}</span>
                                    </div>
                                </button>
                            ))}

                        </nav>
                    </aside>

                    {/* Main Workspace */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        
                        {/* Top Navbar Area */}
                        <header className="px-6 py-4 glass-panel border-b border-slate-700/50 z-10 flex justify-between items-center bg-slate-900/80">
                            <h2 className="text-2xl font-bold text-slate-100">{activeDesc.title}</h2>
                            <button 
                                onClick={() => setShowDesc(!showDesc)}
                                className={`px-4 py-2 rounded-lg text-sm font-bold transition-all border ${
                                    showDesc ? 'bg-slate-800 text-slate-300 border-slate-600 hover:bg-slate-700' : 'bg-indigo-500/20 text-indigo-400 border-indigo-500/50 hover:bg-indigo-500/30'
                                }`}
                            >
                                {showDesc ? '👁️ ซ่อนกระดานทฤษฎี' : '📘 แสดงกระดานทฤษฎี'}
                            </button>
                        </header>

                        {/* Content Splitter */}
                        <div className={`flex-1 p-4 md:p-6 flex flex-col ${showDesc ? 'xl:flex-row' : 'xl:flex-col'} gap-6 overflow-hidden`}>
                            
                            {/* SVG Canvas Area */}
                            <div className="flex-1 flex flex-col glass-panel rounded-2xl shadow-2xl border border-slate-700/50 overflow-hidden min-h-[400px]">
                                
                                <div className="flex-1 canvas-grid relative flex items-center justify-center p-4 lg:p-10 overflow-hidden">
                                    {activeCircuit === 1 && renderCircuit1()}
                                </div>
                                
                                {/* Bottom Controls */}
                                <div className="bg-slate-800/80 p-5 border-t border-slate-700/50 flex flex-wrap items-center justify-center gap-6">
                                    <button 
                                        onClick={() => setPowerOn(!powerOn)}
                                        className={`flex items-center gap-3 px-8 py-3 rounded-full font-bold text-white text-lg transition-all active:scale-95 border ${
                                            powerOn 
                                            ? 'bg-red-500/20 text-red-400 border-red-500/50 hover:bg-red-500/30 shadow-[0_0_15px_rgba(239,68,68,0.2)]' 
                                            : 'bg-emerald-500/20 text-emerald-400 border-emerald-500/50 hover:bg-emerald-500/30 shadow-[0_0_15px_rgba(16,185,129,0.2)]'
                                        }`}
                                    >
                                        <span className="text-2xl">⚡</span>
                                        {powerOn ? 'ปิดวงจร (OFF)' : 'เปิดวงจร (ON)'}
                                    </button>

                                    <div className="flex items-center gap-3 bg-slate-900/50 px-5 py-2 rounded-full border border-slate-700/50">
                                        <span className="text-sm font-bold text-slate-400 mr-2">ขั้วแบตเตอรี่:</span>
                                        <button 
                                            onClick={() => setPolarity(1)}
                                            className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${polarity === 1 ? 'bg-indigo-600 text-white shadow-[0_0_10px_rgba(79,70,229,0.5)]' : 'bg-transparent text-slate-400 hover:text-slate-200 border border-slate-700'}`}
                                        >
                                            ปกติ (+ บน)
                                        </button>
                                        <button 
                                            onClick={() => setPolarity(-1)}
                                            className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${polarity === -1 ? 'bg-orange-600 text-white shadow-[0_0_10px_rgba(234,88,12,0.5)]' : 'bg-transparent text-slate-400 hover:text-slate-200 border border-slate-700'}`}
                                        >
                                            สลับขั้ว (- บน)
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Theory Panel Area */}
                            {showDesc && (
                                <div className={`w-full xl:w-96 flex flex-col gap-5 shrink-0 transition-all duration-300 overflow-y-auto pr-2`}>
                                    
                                    <div className="glass-panel rounded-2xl border border-slate-700/50 p-6">
                                        <h3 className="text-xl font-bold text-indigo-400 mb-4 flex items-center gap-2 border-b border-slate-700/50 pb-3">
                                            <span className="text-2xl">📖</span> หลักการทำงาน
                                        </h3>
                                        <p className="text-slate-300 leading-relaxed text-base">
                                            {activeDesc.explanation}
                                        </p>
                                    </div>
                                    
                                    <div className={`glass-panel rounded-2xl border p-6 transition-colors ${powerOn ? (polarity === 1 ? 'border-emerald-500/30 bg-emerald-900/10' : 'border-orange-500/30 bg-orange-900/10') : 'border-slate-700/50'}`}>
                                        <h4 className={`font-bold text-lg mb-4 flex items-center gap-2 ${powerOn ? (polarity === 1 ? 'text-emerald-400' : 'text-orange-400') : 'text-slate-400'}`}>
                                            <span className="text-2xl">💡</span> สิ่งที่ควรสังเกต 
                                            {powerOn ? (polarity === 1 ? '(ตอนต่อปกติ)' : '(ตอนกลับขั้ว)') : '(เปิดสวิตช์เพื่อดูผลลัพธ์)'}
                                        </h4>
                                        
                                        {!powerOn ? (
                                            <div className="text-slate-500 text-center py-4 italic">
                                                กดปุ่ม "เปิดวงจร (ON)" เพื่อสังเกตการไหลของกระแสไฟฟ้า
                                            </div>
                                        ) : (
                                            <ul className="space-y-4">
                                                {observes.map((obs, idx) => (
                                                    <li key={idx} className="flex items-start gap-3">
                                                        {obs.type === 'good' && <span className="text-emerald-400 mt-0.5 text-lg">✅</span>}
                                                        {obs.type === 'alert' && <span className="text-orange-400 mt-0.5 text-lg">⚠️</span>}
                                                        {obs.type === 'error' && <span className="text-red-400 mt-0.5 text-lg">❌</span>}
                                                        {obs.type === 'info' && <span className="text-cyan-400 mt-0.5 text-lg">👉</span>}
                                                        {obs.type === 'normal' && <span className="text-slate-400 mt-0.5 text-lg">▶</span>}
                                                        <span className="text-slate-300 text-base">{obs.text}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        )}
                                    </div>

                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
